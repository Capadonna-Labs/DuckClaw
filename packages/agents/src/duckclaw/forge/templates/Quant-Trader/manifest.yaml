name: QuantTraderWorker
id: quant_trader
schema_name: finance_worker
topology: general
read_only: true
# Ephemeral read-pool (duckdb.connect RO en hilos) compite con db-writer RW al mismo .duckdb; ver specs/features/finanz/FINANZ_ADMIN_SQL_DB_WRITER.md
tool_read_pool: false
risk_level: conservative
quant:
  enabled: true
network_access: false
browser_sandbox: false
allowed_tables:
  - finance_worker.trading_mandates
  - finance_worker.trade_signals
  - finance_worker.cuentas
  - quant_core.ohlcv_data
  - quant_core.trading_sessions
  - quant_core.trading_risk_constraints
  - quant_core.intraday_moc_accum
  - quant_core.macro_nodes
  - quant_core.macro_edges
  - quant_core.macro_manual_state
  - main.semantic_memory
llm:
  required: true
  temperature: 0.1
skills:
  - get_current_time  # America/Bogota para sesión mercado vs prompts/timeboxing (véase specs/Core-Satellite)
  - read_sql
  - ibkr: {}  # get_ibkr_portfolio: mismo contrato que Finanz (IBKR_PORTFOLIO_API_URL; paper/live vía IBKR_ACCOUNT_MODE)
  - fmp: {}  # get_fmp_stock_dividends, get_fmp_dividends_calendar (FMP_API_KEY)
  - fetch_market_data
  - fetch_ib_gateway_ohlcv
  - tavily_search
  - research:
      tavily_enabled: true
      audit_langsmith: true
      search_depth: advanced
      include_answer: true
      max_results: 8
      include_raw_content: false
  - reddit:
      read_only: true
      npm_package: mcp-reddit
  # GitHub MCP oficial (Docker): solo lectura en este worker (allowlist RW = gitclaw + DUCKCLAW_GITHUB_MCP_READWRITE_WORKERS).
  # Requiere GITHUB_TOKEN, Docker e imagen ghcr.io/github/github-mcp-server (ver scripts/smoke/smoke_github_mcp_stdio.py).
  - github:
      token_env: GITHUB_TOKEN
      hitl_destructive: true
  - execute_sandbox_script
  - accumulate_moc_intraday_state
  - propose_trade_signal
  - execute_approved_signal
  - search_semantic_context
  - macro_pgq_context
