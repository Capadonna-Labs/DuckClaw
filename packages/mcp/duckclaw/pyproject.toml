[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "duckclaw-mcp"
version = "0.1.0"
description = "MCP streamable HTTP server exposing DuckClaw LangGraphs (manager + core fly router)"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "uvicorn[standard]>=0.27.0",
    "httpx>=0.25.0",
    "duckclaw-agents",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.uv.sources]
duckclaw-agents = { path = "../../agents", editable = true }
