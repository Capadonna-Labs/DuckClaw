# Strix: run_sandbox y run_browser_sandbox comparten policy.
# default: allow → bridge para Playwright (noticias/URLs) y yfinance en execute_sandbox_script.
network:
  default: allow
  allow_list:
    - elcolombiano.com
    - www.elcolombiano.com
    - finance.yahoo.com
    - query1.finance.yahoo.com
    - query2.finance.yahoo.com
filesystem:
  readonly_mounts:
    - "${DUCKCLAW_DATA_DIR}:/workspace/repo_db:ro"
    - "/tmp/duckclaw_sandbox:/workspace/data:ro"
  ephemeral_volumes:
    - "/workspace/output"
secrets:
  in_memory_only: true
  allowed_secrets: []
# ML4T HRP (Ledoit-Wolf + clustering) y backtests multi-activo: >120s frecuentes; techo = schema.le
max_execution_time_seconds: 600
