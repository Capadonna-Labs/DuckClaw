# Plantilla base DuckClaw — todo agente nuevo parte de aquí (admin UI).
name: Agente DuckClaw
id: default_agent
schema_name: agent_worker
topology: general
read_only: false
description: >
  Agente base para conversaciones generales y creación rápida de asistentes personalizados desde la consola.
  Sirve como punto de partida para ajustar instrucciones, tono y herramientas.

llm:
  required: true
  temperature: 0.3

comfyui:
  enabled: true
  template: comfy_default
  edit_template: comfy_img2img_edit

skills:
  - get_current_time
  - read_sql

