name: FinanzWorker
id: finanz
description: Gestiona finanzas personales, cuentas, deudas, presupuestos y análisis cuantitativo con evidencia de DuckDB, IBKR y herramientas autorizadas.
schema_name: finance_worker
topology: general
read_only: false
tool_read_pool: false
risk_level: conservative
quant:
  enabled: true
  cfd: true
  lake_ssh: {}
network_access: true
field_reflection:
  enabled: true
browser_sandbox: true
allowed_tables:
- transactions
- categories
- cuentas
- deudas
- presupuestos
- job_opportunities
- quant_core.ohlcv_data
- quant_core.trade_signals
- quant_core.portfolio_positions
- quant_core.fluid_state
llm:
  required: true
  temperature: 0.2
skills:
- insert_transaction
- insert_cuenta
- insert_deuda
- insert_presupuesto
- get_monthly_summary
- get_presupuesto_vs_real
- categorize_expense
- search_semantic_context
- ibkr: {}
- tavily_search
- research:
    tavily_enabled: true
    audit_langsmith: true
    search_depth: advanced
    include_answer: true
    max_results: 12
    include_raw_content: false
- reddit:
    read_only: true
    npm_package: mcp-reddit
- google_trends:
    backend: pytrends
    tool_allowlist:
    - interest_over_time
    - related_queries
- send_proactive_message
- get_current_time
- name: fetch_lake_ohlcv
  type: ssh_remote
  requires_env:
  - CAPADONNA_SSH_HOST
  - CAPADONNA_SSH_USER
  - CAPADONNA_SSH_KEY_PATH
  - CAPADONNA_REMOTE_OHLC_CMD
  network_access: tailscale_only
  fallback: CAPADONNA_OFFLINE_ERROR
forge_context:
  vault_binding:
    scope: private
    vault_id: finanzdb1
