name: QuantTraderWorker
id: quant_trader
schema_name: finance_worker
topology: general
read_only: true
tool_read_pool: false
risk_level: conservative
quant:
  enabled: true
comfyui:
  enabled: true
  template: comfy_default
  edit_template: comfy_img2img_edit
network_access: false
browser_sandbox: true
allowed_tables:
- finance_worker.trading_mandates
- finance_worker.trade_signals
- finance_worker.cuentas
- quant_core.ohlcv_data
- quant_core.trading_sessions
- quant_core.trading_risk_constraints
- quant_core.intraday_moc_accum
- quant_core.macro_nodes
- quant_core.macro_edges
- quant_core.macro_manual_state
- main.semantic_memory
llm:
  required: true
  temperature: 0.1
skills:
- get_current_time
- read_sql
- ibkr: {}
- fmp: {}
- fetch_market_data
- fetch_ib_gateway_ohlcv
- tavily_search
- research:
    tavily_enabled: true
    audit_langsmith: true
    search_depth: advanced
    include_answer: true
    max_results: 8
    include_raw_content: false
- reddit:
    read_only: true
    npm_package: mcp-reddit
- github:
    token_env: GITHUB_TOKEN
    hitl_destructive: true
- execute_sandbox_script
- accumulate_moc_intraday_state
- propose_trade_signal
- execute_approved_signal
- search_semantic_context
- macro_pgq_context
forge_context:
  vault_binding:
    scope: private
    vault_id: quant_traderdb1
