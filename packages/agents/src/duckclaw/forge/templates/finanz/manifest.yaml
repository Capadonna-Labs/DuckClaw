name: FinanzWorker
id: finanz
description: Gestiona finanzas personales, cuentas, deudas, presupuestos y análisis cuantitativo con evidencia de DuckDB, IBKR y herramientas autorizadas.
schema_name: finance_worker
topology: general
read_only: false
tool_read_pool: false
risk_level: conservative
quant:
  enabled: true
  cfd: true
  lake_ssh: {}
network_access: true
field_reflection:
  enabled: true
browser_sandbox: true
allowed_tables:
- transactions
- categories
- cuentas
- deudas
- presupuestos
- job_opportunities
- quant_core.ohlcv_data
- quant_core.trade_signals
- quant_core.portfolio_positions
- quant_core.fluid_state
llm:
  required: true
  temperature: 0.2
skills:
- insert_transaction
- insert_cuenta
- insert_deuda
- insert_presupuesto
- get_monthly_summary
- get_presupuesto_vs_real
- categorize_expense
- search_semantic_context
- ibkr: {}
- tavily_search
- research:
    tavily_enabled: true
    audit_langsmith: true
    search_depth: advanced
    include_answer: true
    max_results: 12
    include_raw_content: false
- reddit:
    read_only: true
    npm_package: mcp-reddit
- google_trends:
    backend: pytrends
    tool_allowlist:
    - interest_over_time
    - related_queries
- send_proactive_message
- get_current_time
- name: fetch_lake_ohlcv
  type: ssh_remote
  requires_env:
  - CAPADONNA_SSH_HOST
  - CAPADONNA_SSH_USER
  - CAPADONNA_SSH_KEY_PATH
  - CAPADONNA_REMOTE_OHLC_CMD
  network_access: tailscale_only
  fallback: CAPADONNA_OFFLINE_ERROR
forge_context:
  vault_binding:
    scope: private
    vault_id: finanzdb1

tool_orchestration:
  clock_anchor:
    tool: get_current_time
    before_intents: [ledger_read, ledger_write, ledger_move]
  intents:
    ledger_read:
      patterns:
        - '(?i)resumen\s+(de\s+)?(mis\s+)?deudas'
        - '(?i)mis\s+deudas'
      force_first_tool: read_sql
    ledger_write:
      patterns:
        - '(?i)\b(agrega|registra|paga|aplica|modifica|actualiza)\b'
      force_first_tool: admin_sql
    ledger_move:
      patterns:
        - '(?i)pasa(r)?\s+la\s+deuda|de\s+mayo\s+a\s+junio'
      force_first_tool: admin_sql
  tool_chains:
    - after_tools: [get_current_time]
      when_intent: ledger_read
      force_next: read_sql
    - after_tools: [get_current_time]
      when_intent: [ledger_read, ledger_write]
      force_next: read_sql
  affirm_followup:
    short_affirm_patterns:
      - '(?i)^\s*(procede|sí|ok|aplica\s+los\s+ajustes|vuelve\s+a\s+intentar)\s*\.?$'
    pending_action_patterns:
      - 'acciones que voy'
      - 'voy a realizar'
      - 'admin_sql'
      - 'aumentaré'
      - 'registraré'
    planned_task_guardrail: guardrails/ledger_affirm_planned.md
  replan:
    rules:
      - when_intent: ledger_write
        require_tool: admin_sql
        unless_tools: [admin_sql]
